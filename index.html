<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gym Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Tracker">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#111318;--ink2:#3a3d47;--muted:#8a8d9a;--line:#e4e2dc;
  --bg:#f5f3ee;--white:#fff;--gold:#c8a96e;--danger:#c0392b;
  --green:#2e8b57;--pr:#c8a96e;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}

/* ── INSTALL BANNER ── */
.install-banner{background:#1e3a5f;color:#f5f3ee;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:12px;line-height:1.4;}
.ib-icon{font-size:20px;flex-shrink:0;}.ib-text{flex:1;}
.ib-close{background:none;border:none;color:rgba(245,243,238,.5);font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px;}

/* ── HEADER ── */
.header{background:var(--ink);padding:18px 20px 0;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:#f5f3ee;letter-spacing:-.3px;}
.logo em{color:var(--gold);font-style:italic;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.header-stats{display:flex;gap:20px;}
.hstat .hv{font-family:'DM Mono',monospace;font-size:22px;color:var(--gold);line-height:1;font-weight:600;}
.hstat .hk{font-size:9px;color:rgba(245,243,238,.3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.sync-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:3px 10px;font-size:10px;color:rgba(245,243,238,.45);cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:all .2s;white-space:nowrap;}
.sync-chip:hover{background:rgba(255,255,255,.12);}
.sync-chip.signed-in{color:#86efac;border-color:rgba(134,239,172,.35);background:rgba(134,239,172,.08);}
.sync-chip.syncing{color:#93c5fd;border-color:rgba(147,197,253,.35);background:rgba(147,197,253,.08);}
.sync-chip.error{color:#fca5a5;border-color:rgba(252,165,165,.35);background:rgba(252,165,165,.08);}
.session-tabs{display:flex;gap:0;margin-top:4px;}
.stab{background:none;border:none;cursor:pointer;padding:11px 18px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:rgba(245,243,238,.4);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.stab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;}
.stab:hover:not(.active){color:rgba(245,243,238,.7);}

/* ── VIEW TABS ── */
.view-tabs{background:var(--white);border-bottom:1px solid var(--line);padding:0 8px;display:flex;gap:0;position:sticky;top:88px;z-index:199;overflow-x:auto;}
.vtab{background:none;border:none;cursor:pointer;padding:11px 10px;font-size:11px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;}
.vtab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:700;}

/* ── CONTENT ── */
.content{padding:14px 14px 110px;}
.page{display:none;}.page.active{display:block;}

/* ── SESSION BANNER ── */
.session-banner{border-radius:8px;padding:13px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;color:#fff;}
.sb-title{font-size:15px;font-weight:700;}.sb-sub{font-size:11px;opacity:.6;margin-top:2px;}
.sb-badge{background:rgba(255,255,255,.12);border-radius:4px;padding:4px 10px;font-size:11px;opacity:.8;}
.sb-right{display:flex;align-items:center;gap:8px;}
.edit-plan-btn{background:rgba(255,255,255,.15);border:none;border-radius:5px;padding:5px 10px;font-size:10px;font-weight:700;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;}

/* ── VOLUME BAR ── */
.session-volume{background:var(--white);border:1px solid var(--line);border-radius:7px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.sv-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.sv-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--ink);}

/* ── DATE ROW ── */
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.date-row label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.date-input{border:1px solid var(--line);border-radius:5px;padding:6px 10px;font-size:13px;background:var(--white);color:var(--ink);font-family:'DM Mono',monospace;}
.saved-badge{font-size:11px;color:#2e8b57;font-weight:700;background:#f0fdf4;border:1px solid #bbf7d0;padding:3px 8px;border-radius:3px;}
.draft-badge{font-size:11px;color:#a06b00;font-weight:700;background:#fefce8;border:1px solid #fde68a;padding:3px 8px;border-radius:3px;display:none;}

/* ── EXERCISE CARDS ── */
.ex-card{background:var(--white);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:7px;overflow:hidden;margin-bottom:10px;transition:border-color .2s;}
.ex-card.has-data{border-left-color:var(--sess-color);}
.ex-head{padding:11px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;}
.ex-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ex-name{font-size:13px;font-weight:600;color:var(--ink);}
.pr-badge{background:var(--gold);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px;display:none;}
.pr-badge.show{display:inline-block;}
.ex-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.ex-target{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;}
.ex-ref{font-size:11px;color:var(--muted);}
/* Compare last time */
.last-time{font-size:10px;color:var(--muted);padding:0 14px 6px;font-family:'DM Mono',monospace;border-bottom:1px dashed var(--line);}
.last-time span{color:var(--ink2);font-weight:500;}
/* Col headers */
.col-heads{display:grid;grid-template-columns:26px 1fr 1fr 26px;gap:5px;padding:5px 14px 4px;border-bottom:1px solid var(--bg);}
.col-head{font-size:9px;color:#ccc;text-transform:uppercase;letter-spacing:1px;text-align:center;}
/* Sets */
.sets-body{padding:5px 14px;}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 26px;gap:5px;align-items:center;margin-bottom:5px;}
.set-num{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s;background:var(--line);color:var(--muted);}
.set-num.filled{background:var(--sess-color);color:#fff;}
.set-input{width:100%;border:1px solid var(--line);border-radius:5px;padding:7px 5px;font-size:15px;font-weight:700;font-family:'DM Mono',monospace;text-align:center;background:var(--bg);transition:border-color .15s,background .15s;-moz-appearance:textfield;}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.set-input:focus{outline:none;border-color:var(--sess-color);background:var(--white);}
.set-input.weight-input{color:var(--sess-color);}.set-input.reps-input{color:var(--ink);}
.rm-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:18px;line-height:1;padding:0;transition:color .15s;display:flex;align-items:center;justify-content:center;width:22px;height:22px;}
.rm-btn:hover:not(:disabled){color:var(--danger);}.rm-btn:disabled{cursor:default;color:#eee;}
/* Ex footer */
.ex-footer{padding:5px 14px 10px;}
.add-set-btn{width:100%;background:none;border:1px dashed var(--sess-color);border-radius:5px;padding:5px;font-size:11px;font-weight:700;color:var(--sess-color);cursor:pointer;margin-top:2px;font-family:'DM Sans',sans-serif;transition:background .15s;}
.add-set-btn:hover{background:rgba(0,0,0,.03);}
.notes-input{width:100%;border:1px solid var(--line);border-radius:5px;padding:6px 10px;font-size:12px;color:var(--ink2);background:#fafaf8;font-family:'DM Sans',sans-serif;margin:5px 0 6px;}
.notes-input:focus{outline:none;border-color:var(--muted);}
.notes-input::placeholder{color:#ccc;}
.ex-volume{font-size:10px;color:var(--muted);text-align:right;font-family:'DM Mono',monospace;margin-top:2px;}
.ex-volume span{color:var(--sess-color);font-weight:700;}

/* ── REST TIMER ── */
.timer-overlay{position:fixed;top:0;left:0;right:0;z-index:500;background:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 16px rgba(0,0,0,.4);transform:translateY(-100%);transition:transform .25s ease;}
.timer-overlay.visible{transform:translateY(0);}
.timer-ring{width:44px;height:44px;flex-shrink:0;position:relative;}
.timer-ring svg{width:44px;height:44px;transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:3;}
.timer-ring .bg{stroke:rgba(255,255,255,.1);}
.timer-ring .fg{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .9s linear;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#fff;}
.timer-info{flex:1;min-width:0;}
.timer-label{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;}
.timer-ex{font-size:12px;font-weight:600;color:#f5f3ee;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.timer-goal-tag{display:inline-block;font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-top:2px;}
.timer-actions{display:flex;gap:6px;flex-shrink:0;}
.timer-btn{background:rgba(255,255,255,.1);border:none;border-radius:5px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:5px 8px;font-family:'DM Sans',sans-serif;}
.timer-btn.dismiss{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);}
.timer-btn:active{opacity:.7;}

/* ── REST CHIP (manual trigger in log) ── */
.rest-chip-row{padding:8px 16px 0;}
.rest-chip{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;}
.rest-chip:active{opacity:.65;}
.rest-chip-emoji{font-size:20px;flex-shrink:0;}
.rest-chip-info{flex:1;min-width:0;}
.rest-chip-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
.rest-chip-detail{font-size:13px;font-weight:700;color:var(--ink);margin-top:1px;}
.rest-chip-cta{font-size:11px;font-weight:600;color:var(--white);background:var(--ink);border-radius:6px;padding:4px 10px;flex-shrink:0;}

/* ── GOAL SELECTOR in editor ── */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 4px;}
.goal-card{border:2px solid var(--line);border-radius:10px;padding:11px 10px;cursor:pointer;transition:all .15s;background:var(--white);text-align:center;-webkit-tap-highlight-color:transparent;}
.goal-card:active{opacity:.8;}
.goal-card.sel{color:#fff;}
.goal-card-emoji{font-size:22px;margin-bottom:3px;}
.goal-card-name{font-size:12px;font-weight:700;line-height:1.2;}
.goal-card-rest{font-size:11px;margin-top:2px;opacity:.75;font-family:'DM Mono',monospace;}
.goal-card-desc{font-size:10px;margin-top:3px;opacity:.55;line-height:1.3;}

/* ── WHOOP ── */
.whoop-card{background:var(--white);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;margin:8px 16px 0;}
.whoop-card.connected{border-color:#3CE0A070;}
.whoop-cfg-row{display:flex;flex-direction:column;gap:6px;margin:10px 0;}
.whoop-cfg-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.whoop-cfg-input{border:1.5px solid var(--line);border-radius:7px;padding:9px 12px;font-size:13px;font-family:'DM Mono',monospace;color:var(--ink);background:var(--bg);width:100%;}
.whoop-cfg-input:focus{outline:none;border-color:var(--ink);}
.whoop-strain-badge{display:inline-flex;align-items:center;gap:5px;background:#111318;color:#3CE0A0;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
.whoop-metric{display:flex;flex-direction:column;gap:1px;}
.whoop-metric-val{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ink);}
.whoop-metric-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* ── HOME PAGE ── */
.home-hero{border-radius:14px;padding:18px 18px 14px;margin-bottom:12px;background:var(--white);border:1px solid var(--line);}
.home-hero-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:6px;}
.home-hero-score{font-family:'DM Mono',monospace;font-size:68px;font-weight:800;line-height:1;}
.home-hero-divider{border:none;border-top:1px solid rgba(0,0,0,.07);margin:12px 0 10px;}
.home-hero-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:0;}
.home-hero-metric{text-align:center;padding:0 4px;}
.home-hero-metric+.home-hero-metric{border-left:1px solid rgba(0,0,0,.07);}
.home-hero-mval{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--ink);line-height:1.2;}
.home-hero-mlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.home-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.home-tile{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:13px 8px 10px;text-align:center;}
.home-tile-icon{font-size:20px;margin-bottom:5px;}
.home-tile-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--ink);line-height:1.1;}
.home-tile-lbl{font-size:10px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.home-tile-sub{font-size:9px;color:var(--muted);margin-top:1px;}

/* ── SESIONES PAGE ── */
.sess-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.sess-card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.sess-card-accent{height:5px;}
.sess-card-body{padding:14px 16px 12px;}
.sess-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.sess-card-info{flex:1;}
.sess-card-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.2;}
.sess-card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.sess-card-meta{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.sess-card-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--bg);}
.sess-card-actions{display:flex;gap:8px;}
.sess-btn-train{flex:1;padding:9px 0;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;}
.sess-btn-edit{padding:9px 14px;border:1px solid var(--line);border-radius:8px;background:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink2);}
.sess-btn-edit:hover{background:var(--bg);}
.sess-new-btn{width:100%;padding:13px;border:2px dashed var(--line);border-radius:14px;background:none;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.sess-new-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--bg);}
.sess-page-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SAVE BAR ── */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--line);padding:10px 14px;z-index:300;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.save-btn{width:100%;border:none;border-radius:7px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:background .3s,transform .1s;font-family:'DM Sans',sans-serif;color:#fff;}
.save-btn:active{transform:scale(.98);}

/* ── HISTORY ── */
.hist-item{background:var(--white);border:1px solid var(--line);border-left:3px solid var(--sess-color);border-radius:7px;overflow:hidden;margin-bottom:10px;}
.hist-toggle{width:100%;background:none;border:none;cursor:pointer;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;font-family:'DM Sans',sans-serif;}
.hist-date{font-size:14px;font-weight:600;color:var(--ink);}
.hist-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.hist-arrow{font-size:14px;color:var(--muted);}
.hist-body{border-top:1px solid var(--bg);padding:0 16px 10px;}
.hist-ex{padding:7px 0;border-bottom:1px solid var(--bg);}
.hist-ex:last-child{border-bottom:none;}
.hist-ex-name{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.hist-sets{font-family:'DM Mono',monospace;font-size:12px;color:var(--sess-color);font-weight:600;}
.hist-notes{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px;}
.hist-vol{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;}
.hist-del-btn{background:none;border:1px solid #fbd5d0;border-radius:5px;color:var(--danger);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;}

/* ── CHARTS ── */
.ex-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.ex-chip{border-radius:4px;padding:6px 11px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--white);color:var(--ink2);font-family:'DM Sans',sans-serif;transition:all .15s;}
.ex-chip.active{color:#fff;font-weight:700;}.ex-chip .chip-count{font-size:10px;opacity:.6;margin-left:4px;}
.chart-stats{border-radius:8px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.cs-item{text-align:center;}.cs-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:#fff;line-height:1;}
.cs-key{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.chart-box{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:14px 8px 8px;margin-bottom:12px;}
.chart-title{font-size:12px;font-weight:600;color:var(--ink2);padding-left:8px;margin-bottom:10px;}
.chart-svg{width:100%;overflow:visible;}
.chart-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.chart-dot{stroke:none;}.chart-grid{stroke:#f0ede8;stroke-width:1;}
.chart-label{font-family:'DM Mono',monospace;font-size:9px;fill:#ccc;}

/* ── LIBRARY ── */
.muscle-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.mtab{border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--white);color:var(--ink2);font-family:'DM Sans',sans-serif;transition:all .15s;flex-shrink:0;}
.mtab.active{color:#fff;border-color:transparent;}
.lib-grid{display:flex;flex-direction:column;gap:10px;}
.lib-card{background:var(--white);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.lib-card-head{display:flex;gap:12px;padding:12px;cursor:pointer;}
.lib-thumb{width:72px;height:72px;border-radius:6px;object-fit:cover;background:var(--bg);flex-shrink:0;}
.lib-thumb-placeholder{width:72px;height:72px;border-radius:6px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
.lib-info{flex:1;min-width:0;}
.lib-name{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.lib-muscle{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.lib-desc{font-size:11px;color:var(--ink2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lib-expand{border-top:1px solid var(--bg);padding:12px;display:none;}
.lib-expand.open{display:block;}
.lib-expand img{width:100%;border-radius:6px;margin-bottom:10px;max-height:200px;object-fit:cover;}
.lib-steps{padding-left:16px;}
.lib-steps li{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:4px;}
.lib-loading{text-align:center;padding:40px 20px;color:var(--muted);}
.lib-loading .spin{font-size:28px;display:inline-block;animation:spin 1s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.lib-error{text-align:center;padding:30px 20px;color:var(--muted);}

/* ── WORKOUT EDITOR ── */
.editor-section{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:12px;}
.editor-section h3{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.editor-section p{font-size:12px;color:var(--muted);margin-bottom:12px;}
.sess-name-input,.sess-sub-input{width:100%;border:1px solid var(--line);border-radius:5px;padding:8px 11px;font-size:13px;color:var(--ink);font-family:'DM Sans',sans-serif;background:var(--bg);margin-bottom:8px;}
.sess-name-input:focus,.sess-sub-input:focus{outline:none;border-color:var(--ink);}
.ed-ex-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.ed-ex-row{background:var(--bg);border-radius:6px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;}
.ed-ex-handle{display:flex;flex-direction:column;gap:2px;flex-shrink:0;margin-top:2px;}
.ed-mv-btn{background:none;border:1px solid var(--line);border-radius:3px;width:22px;height:16px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.ed-ex-fields{flex:1;display:flex;flex-direction:column;gap:5px;}
.ed-field{display:flex;gap:6px;align-items:center;}
.ed-field label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;width:40px;flex-shrink:0;}
.ed-input{flex:1;border:1px solid var(--line);border-radius:4px;padding:5px 8px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);}
.ed-input:focus{outline:none;border-color:var(--ink);}
.ed-select{flex:1;border:1px solid var(--line);border-radius:4px;padding:5px 8px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);}
.ed-del-btn{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;flex-shrink:0;padding:0;transition:color .15s;}
.ed-del-btn:hover{color:var(--danger);}
.add-ex-btn{width:100%;background:none;border:1.5px dashed var(--line);border-radius:6px;padding:10px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.add-ex-btn:hover{border-color:var(--ink);color:var(--ink);}
.save-plan-btn{width:100%;border:none;border-radius:7px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;color:#fff;background:var(--ink);margin-top:10px;transition:opacity .15s;}
.save-plan-btn:hover{opacity:.85;}

/* ── DATA PAGE ── */
.data-section{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:12px;}
.data-section h3{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.data-section p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.data-btn{width:100%;border:none;border-radius:7px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;}
.data-btn:hover{opacity:.85;}.data-btn.export{background:var(--ink);color:#f5f3ee;}
.data-btn.import{background:var(--white);color:var(--ink);border:2px solid var(--line);}
.data-btn.danger{background:#fdf2f1;color:var(--danger);border:2px solid #fbd5d0;}
.data-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.ds-item{background:var(--bg);border-radius:6px;padding:10px;text-align:center;}
.ds-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--ink);}
.ds-key{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.import-area{width:100%;border:2px dashed var(--line);border-radius:7px;padding:10px;font-size:12px;color:var(--ink2);background:var(--bg);font-family:'DM Mono',monospace;resize:vertical;min-height:90px;margin-bottom:8px;}
.import-area:focus{outline:none;border-color:var(--ink);}
.msg{border-radius:5px;padding:9px 12px;font-size:12px;font-weight:600;margin-top:8px;display:none;}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
.msg.err{background:#fdf2f1;color:var(--danger);border:1px solid #fbd5d0;}
.google-btn{width:100%;border:2px solid #e2e2e2;border-radius:7px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff;color:#3c4043;display:flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow .15s;}
.google-btn:hover{box-shadow:0 1px 6px rgba(0,0,0,.12);}
.sync-info{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:6px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--ink2);}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-dot.green{background:#4ade80;}.sync-dot.gray{background:#9ca3af;}.sync-dot.blue{background:#60a5fa;}.sync-dot.red{background:#f87171;}
.install-steps{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.install-step{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:6px;padding:9px 12px;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-text{font-size:12px;color:var(--ink2);}
.step-text b{color:var(--ink);}

/* ── EMPTY / TOOLTIP ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:12px;}.empty-title{font-size:15px;font-weight:600;color:var(--ink2);margin-bottom:6px;}.empty-sub{font-size:12px;}
.tooltip{position:fixed;background:var(--ink);color:#fff;border-radius:6px;padding:7px 11px;font-size:12px;pointer-events:none;z-index:1000;font-family:'DM Mono',monospace;transform:translate(-50%,-110%);box-shadow:0 4px 12px rgba(0,0,0,.2);white-space:nowrap;}
.tooltip::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink);border-bottom:none;}

/* ── EJERCICIOS SUB-TABS ── */
.sub-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:14px;}
.subtab{background:none;border:none;cursor:pointer;padding:9px 14px;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;}
.subtab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:700;}

/* ── EXERCISE ALTERNATIVES ── */
.alt-trigger{font-size:10px;color:var(--gold);font-weight:700;cursor:pointer;letter-spacing:.4px;text-transform:uppercase;border:none;background:none;font-family:'DM Sans',sans-serif;padding:0;transition:color .15s;text-decoration:underline dotted;}
.alt-trigger:hover{color:var(--ink);}
.alt-box{background:#fffbf0;border:1px solid #edd97a;border-radius:6px;padding:8px 12px;margin-top:5px;display:none;}
.alt-box.open{display:block;}
.alt-box-label{font-size:9px;color:#a07b00;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-weight:700;}
.alt-item{font-size:12px;color:var(--ink2);padding:4px 0;display:flex;align-items:center;gap:6px;}
.alt-item::before{content:'↔';color:var(--gold);font-size:11px;}
.alt-item:not(:last-child){border-bottom:1px solid #fde68a;}

/* ── EXERCISE SEARCH (Editor inline) ── */
.ex-search-wrap{position:relative;flex:1;}
.ex-dropdown{position:absolute;left:0;right:0;top:calc(100% + 2px);background:var(--white);border:1.5px solid var(--ink);border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:400;max-height:180px;overflow-y:auto;display:none;}
.ex-dropdown.open{display:block;}
.ex-drop-item{padding:8px 12px;font-size:12px;color:var(--ink2);cursor:pointer;border-bottom:1px solid var(--bg);font-family:'DM Sans',sans-serif;}
.ex-drop-item:last-child{border-bottom:none;}
.ex-drop-item:hover{background:var(--bg);color:var(--ink);}
.ex-drop-item .cat-tag{font-size:9px;color:var(--muted);margin-left:5px;text-transform:uppercase;letter-spacing:.8px;}

/* ── EXERCISE PICKER PANEL ── */
.ex-picker{background:var(--white);border:1.5px solid var(--ink);border-radius:10px;margin:8px 0 12px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.12);}
.picker-top{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--ink);}
.picker-search-input{flex:1;border:none;border-radius:6px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--ink);min-width:0;}
.picker-search-input:focus{outline:none;}
.picker-cancel-btn{background:rgba(255,255,255,.12);border:none;border-radius:6px;color:rgba(255,255,255,.7);font-size:18px;line-height:1;width:32px;height:32px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.picker-cats{display:flex;gap:6px;padding:8px 10px;overflow-x:auto;border-bottom:1px solid var(--bg);background:#fafaf8;-webkit-overflow-scrolling:touch;}
.picker-cats::-webkit-scrollbar{display:none;}
.picker-cat-pill{border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--white);color:var(--ink2);font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.picker-scroll{max-height:270px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.picker-status{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px;}
.picker-cat-hdr{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 14px 5px;position:sticky;top:0;background:var(--white);z-index:2;}
.picker-ex-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--bg);transition:background .1s;-webkit-tap-highlight-color:transparent;}
.picker-ex-item:active{background:var(--bg);}
.picker-ex-name{font-size:13px;font-weight:500;color:var(--ink);line-height:1.3;}
.picker-add-icon{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:300;}
.picker-see-all{padding:6px 14px 12px;font-size:11px;color:var(--gold);font-weight:700;cursor:pointer;display:block;}
.picker-free-row{padding:10px 12px;border-top:1.5px solid var(--line);}
.picker-free-btn{width:100%;background:none;border:1.5px dashed var(--line);border-radius:7px;padding:11px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;transition:all .15s;}
.picker-free-btn:hover,.picker-free-btn:active{border-color:var(--ink);color:var(--ink);}
.picker-load-bar{height:3px;background:linear-gradient(90deg,var(--gold) 30%,transparent 60%);background-size:200%;animation:loadslide 1s linear infinite;}
@keyframes loadslide{from{background-position:100%}to{background-position:-100%}}

/* ── MUSCLE SVG THUMBNAIL ── */
.lib-muscle-svg{width:72px;height:72px;border-radius:6px;background:#f8f6f3;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.muscle-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:3px;}

/* ── LIBRARY CARD V2 (free-exercise-db) ── */
.lib-level{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px;text-transform:capitalize;}
.lib-equip{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--bg);color:var(--muted);letter-spacing:.2px;}
.lib-muscles{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4;}
.lib-muscles b{color:var(--ink2);font-weight:600;}
.lib-img-row{display:flex;gap:6px;margin-bottom:12px;}
.lib-img-row img{flex:1;min-width:0;border-radius:8px;object-fit:cover;max-height:170px;background:var(--bg);}
.lib-steps-ordered{padding-left:18px;margin:0;}
.lib-steps-ordered li{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:5px;padding-left:2px;}
.lib-card-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.lib-fetch-bar{height:2px;background:linear-gradient(90deg,var(--gold) 0%,transparent 60%);background-size:200%;animation:loadslide 1s linear infinite;margin-bottom:4px;}
</style>
</head>

</div>

<!-- TIMER OVERLAY -->
<div class="timer-overlay" id="timer-overlay">

    <div class="timer-ex" id="timer-ex-name">–</div>
    <div class="timer-goal-tag" id="timer-goal-tag"></div>
  </div>
  <div class="timer-actions">
    <button class="timer-btn" onclick="adjustTimer(-30)">−30</button>
    <button class="timer-btn" onclick="adjustTimer(+30)">+30</button>
    <button class="timer-btn dismiss" onclick="stopTimer()">✕</button>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div class="logo">Gym <em>Tracker</em></div>
    <div class="header-right">
      <div class="header-stats">
        <div class="hstat"><div class="hv" id="total-count">0</div><div class="hk">sesiones</div></div>

      </div>
      <button class="sync-chip" id="sync-chip" onclick="handleSyncChip()">☁️ Iniciar sesión</button>
    </div>
  </div>
</div>

<div class="view-tabs">

  <button class="vtab" onclick="setView('data',event)">⚙️ Datos</button>
</div>

<div class="content">

  <div class="page" id="page-log"></div>
  <div class="page" id="page-history"></div>
  <div class="page" id="page-charts"></div>
  <div class="page" id="page-ejercicios"></div>
  <div class="page" id="page-data"></div>
</div>

<div class="save-bar" id="save-bar" style="display:none">
  <button class="save-btn" id="save-btn" onclick="saveSession()">Guardar sesión</button>
</div>

<div class="toast" id="toast"></div>
<div class="tooltip" id="tooltip" style="display:none"></div>

// ─────────────────────────────────────────────────────────────────
// REST TIMER
// ─────────────────────────────────────────────────────────────────
const timerState={active:false,remaining:0,duration:90,total:90,interval:null,exName:''};
const ARC_CIRC=2*Math.PI*19; // r=19

function startTimer(exName){
  if(timerState.interval)clearInterval(timerState.interval);
  const dur=getRestDuration(); // dynamic — based on session goal
  timerState.active=true;
  timerState.duration=dur;
  timerState.remaining=dur;
  timerState.total=dur;
  timerState.exName=exName;
  renderTimerOverlay();
  timerState.interval=setInterval(tickTimer,1000);
}
function tickTimer(){
  timerState.remaining--;
  if(timerState.remaining<=0){
    timerState.remaining=0;
    clearInterval(timerState.interval);
    timerState.active=false;
    renderTimerOverlay();
    playBeep();
  } else renderTimerOverlay();
}
function stopTimer(){
  clearInterval(timerState.interval);
  timerState.active=false;timerState.remaining=0;
  document.getElementById('timer-overlay').classList.remove('visible');
}
function adjustTimer(delta){
  timerState.remaining=Math.max(5,Math.min(600,timerState.remaining+delta));
  timerState.total=Math.max(timerState.total,timerState.remaining);
  renderTimerOverlay();
}
function renderTimerOverlay(){
  const overlay=document.getElementById('timer-overlay');
  const numEl=document.getElementById('timer-num');
  const arcEl=document.getElementById('timer-arc');
  const exEl=document.getElementById('timer-ex-name');
  const goalEl=document.getElementById('timer-goal-tag');
  if(!overlay)return;
  if(!timerState.active&&timerState.remaining===0){overlay.classList.remove('visible');return;}
  overlay.classList.add('visible');
  const m=Math.floor(timerState.remaining/60);
  const s=timerState.remaining%60;
  numEl.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  const pct=timerState.total>0?timerState.remaining/timerState.total:1;
  const offset=ARC_CIRC*(1-pct);
  arcEl.style.strokeDasharray=ARC_CIRC;
  arcEl.style.strokeDashoffset=offset;
  exEl.textContent=timerState.exName||'–';
  if(goalEl){const g=getRestGoal();goalEl.textContent=`${g.emoji} ${g.label}`;}
  // Arc color: gold → red as time runs out
  if(pct<0.25)arcEl.style.stroke='#f87171';
  else if(pct<0.5)arcEl.style.stroke='#fbbf24';
  else arcEl.style.stroke='var(--gold)';
}
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.15,0.3].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0.4,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.2);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.25);
    });
  }catch(e){}
}
function checkAutoTimer(exId,idx){
  const d=formData[exId];if(!d||!d.sets[idx])return;
  const s=d.sets[idx];
  if(s.weight&&s.reps){
    const sess=workoutDefs[currentSession];
    const ex=sess?.exercises.find(e=>e.id===exId);
    startTimer(ex?.name||exId);
  }
}

}

function getHistoricMax(exId,excludeDate){
  return Object.values(allLogs)
    .filter(l=>l.session===currentSession&&(!excludeDate||l.date!==excludeDate))
    .flatMap(l=>(l.data[exId]?.sets||[]).map(s=>parseFloat(s.weight)||0))
    .reduce((mx,w)=>Math.max(mx,w),0);
}
function getCurrentMax(exId){
  return(formData[exId]?.sets||[]).map(s=>parseFloat(s.weight)||0).reduce((mx,w)=>Math.max(mx,w),0);
}
function isCurrentPR(exId){
  const cur=getCurrentMax(exId);
  if(!cur)return false;
  return cur>getHistoricMax(exId,currentDate);
}
function detectAndShowPRs(){
  const sess=workoutDefs[currentSession];
  const prs=[];
  sess.exercises.forEach(ex=>{
    const cur=getCurrentMax(ex.id);
    if(!cur)return;
    const hist=getHistoricMax(ex.id,currentDate);
    if(cur>hist)prs.push({name:ex.name,weight:cur,unit:ex.unit});
  });
  if(prs.length>0){
    const msg=prs.length===1
      ?`🏆 PR: ${prs[0].name} — ${prs[0].weight}${prs[0].unit}`
      :`🏆 ${prs.length} PRs nuevos esta sesión`;
    showToast(msg,3500);
  }
}

// ─────────────────────────────────────────────────────────────────
function calcExVolume(exId,data){
  const d=data||(formData[exId]);
  if(!d?.sets)return 0;
  return d.sets.reduce((t,s)=>{
    const w=parseFloat(s.weight)||0,r=parseInt(s.reps)||0;
    return t+(w*r);
  },0);
}
function calcSessionVolume(){
  return(workoutDefs[currentSession]?.exercises||[]).reduce((t,ex)=>t+calcExVolume(ex.id),0);
}
function fmtVol(v){return v>=1000?(v/1000).toFixed(1)+'t':v.toFixed(0)+' kg'}

// ─────────────────────────────────────────────────────────────────
// COMPARE WITH LAST SESSION
// ─────────────────────────────────────────────────────────────────
function getLastSessionData(exId){
  const logs=Object.values(allLogs)
    .filter(l=>l.session===currentSession&&l.date!==currentDate&&l.data[exId]?.sets?.some(s=>s.weight||s.reps))
    .sort((a,b)=>b.date.localeCompare(a.date));
  return logs[0]?{log:logs[0],data:logs[0].data[exId]}:null;
}

// ─────────────────────────────────────────────────────────────────
// RENDER HISTORY
// ─────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────
// ACTIVITY HEATMAP (GitHub-style)
// ─────────────────────────────────────────────────────────────────
function buildHeatmapData(){
  const byDate={};
  Object.values(allLogs).forEach(log=>{
    const vol=Object.values(log.data||{}).reduce((t,ex)=>
      t+(ex?.sets||[]).reduce((s,r)=>s+((parseFloat(r.weight)||0)*(parseInt(r.reps)||0)),0),0);
    if(!byDate[log.date])byDate[log.date]={volume:0,sessions:[]};
    byDate[log.date].volume+=vol;
    byDate[log.date].sessions.push(log.session);
  });
  // Level 1-4 by volume quartile among training days
  const vols=Object.values(byDate).map(d=>d.volume).filter(v=>v>0).sort((a,b)=>a-b);
  const n=vols.length;
  const q=p=>vols[Math.max(0,Math.floor(n*p)-1)]||0;
  Object.values(byDate).forEach(d=>{
    const v=d.volume;
    d.level=n<2?1:v<=q(.25)?1:v<=q(.5)?2:v<=q(.75)?3:4;
  });
  return byDate;
}

function calcHeatmapStats(byDate){
  // Week-based streak (consecutive weeks with ≥1 workout)
  const wk=ds=>{const d=new Date(ds+'T12:00:00'),dw=d.getDay(),dm=dw===0?6:dw-1;
    d.setDate(d.getDate()-dm);return d.toISOString().split('T')[0];};
  const weeks=new Set(Object.keys(byDate).map(wk));
  const sw=[...weeks].sort();
  let lng=0,streak=0,prev=null;
  for(const w of sw){
    streak=prev&&Math.round((new Date(w)-new Date(prev))/604800000)===1?streak+1:1;
    if(streak>lng)lng=streak;
    prev=w;
  }
  let cur=0;const tw=wk(today());let chk=new Date(tw+'T12:00:00');
  while(weeks.has(chk.toISOString().split('T')[0])){cur++;chk.setDate(chk.getDate()-7);}
  const ago28=new Date();ago28.setDate(ago28.getDate()-27);
  const recent=Object.keys(byDate).filter(d=>d>=ago28.toISOString().split('T')[0]).length;
  return{cur,lng,total:Object.keys(byDate).length,recent};
}

function renderHeatmap(){
  const byDate=buildHeatmapData();
  const{cur,lng,total,recent}=calcHeatmapStats(byDate);
  const CELL=11,GAP=2,STEP=CELL+GAP,WEEKS=53;
  const COLS=['#ebedf0','#9be9a8','#40c463','#30a14e','#216e39'];
  const MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  // Grid: start from Monday of the week WEEKS-1 weeks before the current week
  const now=new Date();
  const dow=now.getDay(),dm=dow===0?6:dow-1;
  const curMonday=new Date(now);curMonday.setDate(now.getDate()-dm);
  const start=new Date(curMonday);start.setDate(curMonday.getDate()-(WEEKS-1)*7);

  // Build columns (each = 1 week Mon→Sun)
  const weeks=[];const d=new Date(start);
  while(d<=now||(weeks.length<WEEKS&&d.getDay()!==1)){
    if(weeks.length===WEEKS)break;
    const week=[];
    for(let i=0;i<7;i++){
      const ds=d.toISOString().split('T')[0];
      const future=d>now;
      const info=byDate[ds];
      week.push({date:ds,level:future?-1:(info?info.level:0),
        volume:info?.volume||0,sessions:info?.sessions||[],future,isToday:ds===today()});
      d.setDate(d.getDate()+1);
    }
    weeks.push(week);
  }

  // Month labels (absolute positioned over the scroll container)
  let mlHtml='',lastM=-1;
  weeks.forEach((wk,wi)=>{
    const first=wk.find(c=>!c.future);if(!first)return;
    const m=new Date(first.date+'T12:00:00').getMonth();
    if(m!==lastM){mlHtml+=`<span style="position:absolute;left:${wi*STEP}px;font-size:9px;color:var(--muted);font-weight:600;white-space:nowrap">${MN[m]}</span>`;lastM=m;}
  });

  // Day labels: show L X V (Mon Wed Fri) only
  const DL=['L','','X','','V','',''];
  const dlHtml=DL.map(l=>
    `<div style="height:${CELL}px;font-size:9px;line-height:${CELL}px;color:var(--muted);width:9px;text-align:right;flex-shrink:0">${l}</div>`
  ).join(`<div style="height:${GAP}px"></div>`);

  // Grid cells
  const gridHtml=weeks.map(wk=>
    `<div style="display:flex;flex-direction:column;gap:${GAP}px">
    ${wk.map(c=>{
      if(c.future)return`<div style="width:${CELL}px;height:${CELL}px"></div>`;
      const bg=COLS[Math.max(0,c.level)];
      const outline=c.isToday?`outline:2px solid var(--ink);outline-offset:1px;`:'';
      return`<div onclick="heatmapTap('${c.date}')"
        style="width:${CELL}px;height:${CELL}px;border-radius:2px;background:${bg};${outline}flex-shrink:0;cursor:${c.sessions.length?'pointer':'default'}"></div>`;
    }).join('')}
    </div>`
  ).join('');

  const totalW=weeks.length*STEP+14;
  return`
    <div style="background:var(--white);border-radius:14px;margin:12px 16px 4px;padding:16px 16px 12px;border:1px solid var(--line)">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">Actividad · Último año</div>
      <div style="display:flex;gap:0;margin-bottom:16px">
        ${[
          [cur, cur===1?'Semana<br>seguida':'Semanas<br>seguidas', cur>0?'🔥':''],
          [lng, 'Mejor<br>racha', ''],
          [recent, 'Últimas<br>4 sem.', ''],
          [total, 'Total<br>sesiones', ''],
        ].map(([v,l,e])=>`<div style="flex:1;border-right:1px solid var(--line);padding:0 10px;first:padding-left:0">
          <div style="font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ink);line-height:1">${v}${e?` <span style="font-size:16px">${e}</span>`:''}</div>
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;line-height:1.4">${l}</div>
        </div>`).join('')}
      </div>
      <div id="hm-scroll" style="overflow-x:auto;-webkit-overflow-scrolling:touch;cursor:grab">
        <div style="min-width:${totalW}px;padding-bottom:2px">
          <div style="position:relative;height:13px;margin-left:12px;margin-bottom:4px">${mlHtml}</div>
          <div style="display:flex;gap:3px;align-items:flex-start">
            <div style="display:flex;flex-direction:column;gap:${GAP}px;padding-top:0;flex-shrink:0">${dlHtml}</div>
            <div style="display:flex;gap:${GAP}px">${gridHtml}</div>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:10px;font-size:10px;color:var(--muted)">
        Menos ${COLS.map(c=>`<div style="width:10px;height:10px;border-radius:2px;background:${c};display:inline-block"></div>`).join('')} Más
      </div>
    </div>`;
}

function heatmapTap(date){
  const d=buildHeatmapData()[date];
  if(!d||!d.sessions.length)return;
  const sess=d.sessions.slice().sort().join(' + ');
  const vol=d.volume>0?` · ${fmtVol(d.volume)}`:'';
  const strain=(getWhoopCache().workouts||{})[date]?.strain;
  const strainTxt=strain!=null?` · 💥 Strain ${fmtStrain(strain)}`:'';
  showToast(`${fmtDate(date)} — ${sess}${vol}${strainTxt}`,3200);
}

  setTimeout(()=>{const s=document.getElementById('hm-scroll');if(s)s.scrollLeft=s.scrollWidth;},0);
}

function renderHistBody(log,sess,color){
  let html='';
  for(const ex of sess.exercises){
    const d=log.data[ex.id];
    if(!d?.sets?.some(s=>s.weight||s.reps))continue;
    const filled=d.sets.filter(s=>s.weight||s.reps);
    const setsStr=filled.map((s,i)=>`S${i+1}: ${s.weight?`<b>${s.weight}${ex.unit}</b>`:'—'}${s.reps?` ×${s.reps}`:''}`).join('  ·  ');
    const vol=calcExVolume(ex.id,d);
    // Check if this was a PR at the time
    const maxW=Math.max(...(d.sets.map(s=>parseFloat(s.weight)||0)));
    const hist=Object.values(allLogs).filter(l=>l.session===sess.label.slice(-1)&&l.date<log.date).flatMap(l=>(l.data[ex.id]?.sets||[]).map(s=>parseFloat(s.weight)||0)).reduce((mx,w)=>Math.max(mx,w),0);
    const wasPR=maxW>0&&maxW>hist;
    html+=`<div class="hist-ex">
      <div class="hist-ex-name">${ex.name}${wasPR?'<span class="pr-badge show" style="font-size:9px">🏆 PR</span>':''}</div>
      <div class="hist-sets">${setsStr}</div>
      ${d.notes?`<div class="hist-notes">${d.notes}</div>`:''}
      ${vol>0?`<div class="hist-vol">Vol: ${fmtVol(vol)}</div>`:''}
    </div>`;
  }
  html+=`<button class="hist-del-btn" onclick="deleteLog('${log.date}')">🗑 Eliminar sesión</button>`;
  return html;
}

function toggleLog(date){expandedLog=expandedLog===date?null:date;renderHistory();}
function deleteLog(date){
  if(!confirm(`¿Eliminar la sesión del ${fmtDate(date)}?`))return;
  const key=`${currentSession}_${date}`;
  delete allLogs[key];saveAll();deleteFromCloud(key);updateStats();expandedLog=null;renderHistory();
}

function getChartData(exId){
  return Object.values(allLogs)

    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(l=>{
      const sets=l.data[exId].sets||[];
      const weights=sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0);
      const reps=sets.map(s=>parseInt(s.reps)||0).filter(r=>r>0);
      const ex=workoutDefs[currentSession]?.exercises.find(e=>e.id===exId);
      return{date:l.date,weight:weights.length?Math.max(...weights):0,
        reps:reps.length?Math.round(reps.reduce((a,b)=>a+b,0)/reps.length):0,unit:ex?.unit||'kg'};

function renderSVGChart(data,key,unit,color){
  const W=340,H=150,PL=36,PR=16,PT=10,PB=26,cW=W-PL-PR,cH=H-PT-PB;
  const vals=data.map(d=>d[key]);
  const minV=Math.min(...vals),maxV=Math.max(...vals),range=maxV-minV||1;
  const xs=data.map((_,i)=>PL+(i/(Math.max(data.length-1,1)))*cW);
  const ys=vals.map(v=>PT+cH-((v-minV)/range)*cH);
  const yL=[minV,minV+range/2,maxV].map(v=>Math.round(v*10)/10);
  let svg=`<svg class="chart-svg" viewBox="0 0 ${W} ${H}" style="height:${H}px">`;
  [0,.5,1].forEach(t=>{const y=PT+cH-t*cH;
    svg+=`<line class="chart-grid" x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}"/>`;
    svg+=`<text class="chart-label" x="${PL-4}" y="${y+3}" text-anchor="end">${yL[t===0?0:t===.5?1:2]}</text>`;
  });
  const step=Math.max(1,Math.floor(data.length/5));
  data.forEach((d,i)=>{if(i%step===0||i===data.length-1)svg+=`<text class="chart-label" x="${xs[i]}" y="${H-4}" text-anchor="middle">${fmtShort(d.date)}</text>`;});
  if(data.length>1){
    svg+=`<polyline class="chart-line" points="${xs.map((x,i)=>`${x},${ys[i]}`).join(' ')}" stroke="${color}"/>`;
    svg+=`<polygon points="${[`${xs[0]},${PT+cH}`,...xs.map((x,i)=>`${x},${ys[i]}`),`${xs[xs.length-1]},${PT+cH}`].join(' ')}" fill="${color}" opacity=".08"/>`;
  }
  data.forEach((d,i)=>{
    const tip=`${fmtDate(d.date)}: ${d[key]}${unit}`;
    svg+=`<circle class="chart-dot" cx="${xs[i]}" cy="${ys[i]}" r="5" fill="${color}" onmouseenter="showTip(event,'${tip}')" onmouseleave="hideTip()" ontouchstart="showTip(event,'${tip}')"/>`;
  });
  return svg+'</svg>';
}

const CATEGORY_ALTS={

  12:['Remo en máquina','Pullover cable','Face pull','Remo con mancuerna','Dominadas con agarre neutro'],

  8: ['Curl predicador','Curl en máquina','Press francés EZ','Kickbacks tríceps','Tríceps en cable cuerda'],
  9: ['Prensa de piernas','Hack squat','Step-up mancuernas','Extensión de cuádriceps','Curl femoral tumbado'],
  10:['Plancha (plank)','Russian twist','Crunch en máquina','Elevación de piernas colgado','Ab wheel'],

function guessExCat(name){
  const n=(name||'').toLowerCase();
  if(/pecho|banca|inclinado|push.?up|fly|apertura|crossover|press.*pech|chest/.test(n))return 11;
  if(/espalda|remo|lat\b|pulldown|dominada|jal[oó]n|pull.*up|back|row/.test(n))return 12;
  if(/hombro|militar|shoulder|elevaci|arnold|face.?pull|deltoid|upright/.test(n))return 13;
  if(/curl|b[ií]cep|tríc|tric|martillo|hammer|predicador|fondo|dip/.test(n))return 8;
  if(/pierna|leg|squat|sentadil|lunge|prensa|muerto|deadlift|hip.?thrust|glute|femoral|b[úu]lgar/.test(n))return 9;
  if(/core|abs|plancha|plank|crunch|abdomen|russian|rueda|ab.?wheel/.test(n))return 10;
  return null;
}
function getAlternatives(exName,count=2){
  const catId=guessExCat(exName);
  const pool=catId&&CATEGORY_ALTS[catId]?CATEGORY_ALTS[catId]:['Ejercicio equivalente en máquina','Versión con mancuernas'];
  const nl=exName.toLowerCase();
  const filtered=pool.filter(a=>!nl.includes(a.toLowerCase().split(' ')[0].replace(/[^\w]/g,'')));
  return filtered.slice(0,count).length>=count?filtered.slice(0,count):pool.slice(0,count);
}

  'adductors':9,'abductors':9,

};

function exToCatId(ex){
  for(const m of(ex.primaryMuscles||[])){
    const id=MUSCLE_TO_CAT[m.toLowerCase()];
    if(id)return id;
  }
  return null;
}

// Returns a Promise<boolean>; concurrent calls share the same fetch
function ensureFreeExDb(){
  if(_freeExAll?.length)return Promise.resolve(true);
  if(_freeExPromise)return _freeExPromise;
  _freeExPromise=(async()=>{
    // 1. Try localStorage cache (full DB, 7-day TTL)
    try{
      const c=localStorage.getItem(FREE_EX_CACHE_KEY);
      if(c){const{data,ts}=JSON.parse(c);if(Date.now()-ts<FREE_EX_TTL){_freeExAll=data;return true;}}
    }catch(e){}
    // 2. Fetch from GitHub CDN
    try{
      const resp=await fetch(FREE_EX_URL);
      if(!resp.ok)throw new Error('HTTP '+resp.status);
      _freeExAll=await resp.json();
      // Try to cache full DB; silently ignore if device storage is full
      try{localStorage.setItem(FREE_EX_CACHE_KEY,JSON.stringify({data:_freeExAll,ts:Date.now()}));}
      catch(e){/* too large — stays in memory only */}
      return true;
    }catch(e){
      console.error('Free exercise DB:',e);
      _freeExAll=[];
      return false;
    }
  })();
  return _freeExPromise;
}

function getFreeExForCat(catId){
  return(_freeExAll||[]).filter(ex=>exToCatId(ex)===catId);
}

// Convert a free-exercise-db entry → our libData entry format
function freeExToLibEntry(ex){
  const imgs=(ex.images||[]).map(p=>FREE_EX_IMG+p);
  return{
    id:ex.id,
    name:ex.name,
    description:(ex.instructions||[]).join(' '),
    images:imgs.length?[{image:imgs[0]}]:[],
    allImages:imgs,
    level:ex.level,
    equipment:ex.equipment,
    category:ex.category,
    primaryMuscles:ex.primaryMuscles||[],
    secondaryMuscles:ex.secondaryMuscles||[],
    instructions:ex.instructions||[],
  };
}

function toggleLibExEl(el){

function toggleLibEx(id){libExpanded[id]=!libExpanded[id];document.getElementById('lib-ex-'+id)?.classList.toggle('open',libExpanded[id]);}

async function selectLibCat(catId){
  libCat=catId;
  if(!libData[catId]&&!libLoading[catId]) await fetchLibCat(catId);
  else renderLibrary();
}

async function fetchLibCat(catId){
  // 1. Check per-category localStorage cache (7 days)
  try{
    const c=localStorage.getItem(LIB_CACHE_PRE+catId);
    if(c){const{data,ts}=JSON.parse(c);if(Date.now()-ts<FREE_EX_TTL&&data?.length){libData[catId]=data;renderLibrary();if(pickerVisible)renderPickerList();return;}}
  }catch(e){}

  libLoading[catId]=true; renderLibrary();

  // 2. Load the full exercise database (one shared fetch, cached)
  await ensureFreeExDb();

  // 3. Filter and convert
  libData[catId]=getFreeExForCat(catId).map(freeExToLibEntry);

  // 4. Cache per-category (smaller subset → fits comfortably in localStorage)
  try{localStorage.setItem(LIB_CACHE_PRE+catId,JSON.stringify({data:libData[catId],ts:Date.now()}));}catch(e){}

  libLoading[catId]=false;
  renderLibrary();
  if(pickerVisible)renderPickerList();
}

// Force-refresh a category (clears cache first)
function forceFetchLibCat(catId){
  localStorage.removeItem(LIB_CACHE_PRE+catId);
  delete libData[catId];
  fetchLibCat(catId);
}

function renderPickerList(){
  const listEl=document.getElementById('picker-list');
  if(!listEl)return;
  const q=(document.getElementById('picker-search')?.value||'').toLowerCase().trim();

  const anyLoading=MUSCLE_CATS.some(mc=>libLoading[mc.id]);
  const hasAny=MUSCLE_CATS.some(mc=>libData[mc.id]?.length);
  const bar=document.getElementById('picker-bar');
  if(bar)bar.style.display=anyLoading?'block':'none';

  if(!hasAny&&anyLoading){
    listEl.innerHTML='<div class="picker-status">⏳ Cargando ejercicios…</div>';
    return;
  }

  const catsToShow=pickerCat?MUSCLE_CATS.filter(mc=>mc.id===pickerCat):MUSCLE_CATS;
  let html='';

  catsToShow.forEach(mc=>{
    if(!libData[mc.id]?.length)return;
    const pool=q?libData[mc.id].filter(e=>e.name.toLowerCase().includes(q)):libData[mc.id];
    if(!pool.length)return;

    // Show category header only in "all" mode or when searching across cats
    if(!pickerCat||q){
      html+=`<div class="picker-cat-hdr" style="color:${mc.color}">${mc.emoji} ${mc.name}</div>`;
    }

    const limit=pickerCat&&!q?pool.length:(q?15:5);
    pool.slice(0,limit).forEach(ex=>{
      // KEY FIX: use data-exname attribute, not onclick JSON — avoids quote-breaking bugs
      html+=`<div class="picker-ex-item" data-exname="${escHtml(ex.name)}" onclick="pickExFromEl(this)">
        <span class="picker-ex-name">${escHtml(ex.name)}</span>
        <span class="picker-add-icon">＋</span>
      </div>`;
    });

    if(!pickerCat&&!q&&pool.length>5){
      html+=`<button class="picker-see-all" data-cat="${mc.id}" onclick="setPickerCat(${mc.id})">
        Ver todos los ejercicios de ${mc.name} (${pool.length}) →
      </button>`;
    }
  });

  listEl.innerHTML=html||'<div class="picker-status">Sin resultados — usa el nombre libre ↓</div>';
}

function exportData(){
  const blob=new Blob([JSON.stringify(allLogs,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`gymtracker_backup_${today()}.json`;a.click();
  URL.revokeObjectURL(url);
}
function importFromText(){
  const text=document.getElementById('import-text').value.trim();
  const msg=document.getElementById('import-msg');
  if(!text){showMsg(msg,'Pega el contenido JSON antes de importar','err');return;}
  try{
    const parsed=JSON.parse(text);const count=Object.keys(parsed).length;
    if(!count){showMsg(msg,'JSON vacío o formato incorrecto','err');return;}
    allLogs={...allLogs,...parsed};saveAll();updateStats();
    if(currentUser&&fbDb){
      const batch=fbDb.batch();
      Object.keys(parsed).forEach(k=>batch.set(sessionsRef().doc(k),parsed[k]));
      batch.commit().catch(console.error);
    }
    document.getElementById('import-text').value='';
    showMsg(msg,`✓ ${count} sesiones importadas`,'ok');renderData();
  }catch(e){showMsg(msg,'JSON inválido','err');}
}
function importFromFile(){
  const input=document.createElement('input');input.type='file';input.accept='.json,application/json';
  input.onchange=e=>{const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();reader.onload=ev=>{document.getElementById('import-text').value=ev.target.result;};
    reader.readAsText(file);};
  input.click();
}
function clearAllData(){
  if(!confirm('¿Eliminar TODOS los datos? No se puede deshacer.'))return;

// FIREBASE AUTH + SYNC
// ─────────────────────────────────────────────────────────────────
function sessionsRef(){return fbDb.collection('users').doc(currentUser.uid).collection('sessions');}

function initFirebase(){
  try{
    firebase.initializeApp(FB_CONFIG);
    fbDb=firebase.firestore();fbAuth=firebase.auth();

    // Handle returning from signInWithRedirect (fallback path)
    fbAuth.getRedirectResult().then(result=>{
      if(result&&result.user)console.log('Redirect sign-in OK:',result.user.email);
    }).catch(e=>{
      if(e.code&&e.code!=='auth/no-auth-event'){
        console.error('Redirect error:',e);
        setCloudStatus('error');
        showToast('⚠️ Error de autenticación: '+e.code);
      }
    });

    fbAuth.onAuthStateChanged(async user=>{
      currentUser=user;
      if(user){await syncFromCloud();}
      else{setCloudStatus('not-signed-in');if(currentView==='data')renderData();}
    });

    // ── Fallback for Chrome iOS PWA ──────────────────────────────────────
    // Firebase notifies via BroadcastChannel when another tab signs in.
    // If BroadcastChannel works (storage shared), onAuthStateChanged fires
    // automatically. The visibilitychange check is a manual fallback for
    // cases where storage is isolated between PWA and browser tabs.
    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='visible'&&!currentUser&&fbAuth){
        const user=fbAuth.currentUser;
        if(user){
          currentUser=user;
          setCloudStatus('syncing');
          syncFromCloud().then(()=>render());
          showToast('✓ Sesión detectada: '+user.email);
        }
      }
    });

  }catch(e){console.warn('Firebase init error:',e);}
}

async function syncFromCloud(){
  if(!currentUser||!fbDb)return;
  setCloudStatus('syncing');
  try{
    // Sync sessions
    const snap=await sessionsRef().get();
    const cloudLogs={};snap.forEach(doc=>{cloudLogs[doc.id]=doc.data();});
    const localOnlyKeys=Object.keys(allLogs).filter(k=>!cloudLogs[k]);
    if(localOnlyKeys.length>0){
      const batch=fbDb.batch();
      localOnlyKeys.forEach(k=>batch.set(sessionsRef().doc(k),allLogs[k]));
      await batch.commit();
    }
    allLogs={...allLogs,...cloudLogs};saveAll();

    // Sync workout defs
    try{
      const wSnap=await fbDb.collection('users').doc(currentUser.uid).collection('config').doc('workouts').get();
      if(wSnap.exists){
        const cloudDefs=wSnap.data();
        // Merge: cloud wins
        workoutDefs={...workoutDefs,...cloudDefs};
        localStorage.setItem(WORKOUT_KEY,JSON.stringify(workoutDefs));
      }
    }catch(e){}

    updateStats();render();
    lastSyncTime=new Date();setCloudStatus('synced');

    // Load WHOOP data written by the Python sync script (non-blocking)
    loadWhoopFromFirestore().catch(()=>{});
  }catch(e){console.error('Sync error:',e);setCloudStatus('error');}
}

async function saveToCloud(key){
  if(!currentUser||!fbDb)return;
  try{await sessionsRef().doc(key).set(allLogs[key]);lastSyncTime=new Date();setCloudStatus('synced');}
  catch(e){console.error('Cloud save error:',e);setCloudStatus('error');}
}
async function deleteFromCloud(key){
  if(!currentUser||!fbDb)return;
  try{await sessionsRef().doc(key).delete();}catch(e){console.error('Cloud delete:',e);}
}
function _isStandalone(){
  return window.navigator.standalone===true||
    window.matchMedia('(display-mode: standalone)').matches;
}
async function signInWithGoogle(){
  if(!fbAuth)return;
  const provider=new firebase.auth.GoogleAuthProvider();
  // ── signInWithPopup for ALL contexts ─────────────────────────────────────
  // Why this works even in Chrome iOS PWA:
  //   window.open(sameOriginPwaUrl) → Chrome intercepts → redirects to PWA → tab closes instantly ✗
  //   signInWithPopup internally opens firebaseapp.com/__/auth/handler (DIFFERENT domain)
  //   → Chrome does NOT intercept → popup stays open → user signs in → postMessage back → done ✓
  //
  // If popup is genuinely blocked (auth/popup-blocked error), fall back to redirect.
  try{
    await fbAuth.signInWithPopup(provider);
  }catch(e){
    if(e.code==='auth/popup-blocked'){
      showToast('Popup bloqueado — redirigiendo a Google…');
      setTimeout(()=>fbAuth.signInWithRedirect(provider),400);
    } else if(!['auth/cancelled-popup-request','auth/popup-closed-by-user','auth/user-cancelled'].includes(e.code)){
      showToast('⚠️ '+(e.message||'Error al iniciar sesión'));
    }
  }
}
// Fallback for edge cases: manually re-check Firebase auth state.
async function recheckAuth(){
  if(!fbAuth||currentUser)return;
  const user=fbAuth.currentUser;
  if(user){
    currentUser=user;
    setCloudStatus('syncing');
    await syncFromCloud();
    render();
    showToast('✓ Sesión iniciada: '+user.email);
  } else {
    showToast('Sin sesión detectada — inténtalo de nuevo');
  }
}
async function signOutUser(){
  if(!fbAuth)return;
  if(!confirm('¿Cerrar sesión? Los datos locales se conservan.'))return;
  await fbAuth.signOut();
}
function handleSyncChip(){
  if(cloudStatus==='not-signed-in'||cloudStatus==='error')signInWithGoogle();
  else if(cloudStatus==='synced')signOutUser();
}
function setCloudStatus(status){
  cloudStatus=status;
  const chip=document.getElementById('sync-chip');if(!chip)return;
  const label={'not-signed-in':'☁️ Iniciar sesión','syncing':'🔄 Sincronizando…',
    'synced':`✓ ${currentUser?.email?.split('@')[0]??'Sincronizado'}`,'error':'⚠️ Reintentar'};
  const cls={'not-signed-in':'','syncing':'syncing','synced':'signed-in','error':'error'};
  chip.textContent=label[status]??'';
  chip.className='sync-chip'+(cls[status]?' '+cls[status]:'');
  if(currentView==='data')renderData();
}

async function loadWhoopFromFirestore(){
  if(!currentUser||!fbDb) return;
  try{
    const snap=await fbDb
      .collection('users').doc(currentUser.uid)
      .collection('whoop').doc('cache')
      .get();
    if(!snap.exists) return;
    const data=snap.data();
    // Merge Firestore data into local cache — Firestore wins (freshest data)
    _whoopCache={...getWhoopCache(),...data, lastSync: data.lastSync
      ? new Date(data.lastSync).getTime() : Date.now()};
    try{localStorage.setItem('whoop_cache',JSON.stringify(_whoopCache));}catch(e){}
    if(currentView==='home')   renderHome();
    if(currentView==='log')    renderLog();
    if(currentView==='history')renderHistory();
    console.log('[WHOOP] Loaded from Firestore, lastSync:', data.lastSync);
  }catch(e){
    console.warn('[WHOOP] Could not load from Firestore:', e.message);
  }
}

// ─────────────────────────────────────────────────────────────────
// WHOOP INTEGRATION
// ─────────────────────────────────────────────────────────────────
const WHOOP_AUTH  = 'https://api.prod.whoop.com/oauth/oauth2/auth';
const WHOOP_SCOPE = 'read:recovery read:sleep read:workout read:profile read:body_measurement';

// Token exchange + API calls go through the Cloudflare Worker (avoids CORS)
// wls('worker_url') is set by the user in the settings UI
function whoopTokenUrl(){ return (wls('worker_url')||'').replace(/\/$/,'')+'/token'; }
function whoopApiBase(){ return (wls('worker_url')||'').replace(/\/$/,'')+'/api/v1'; }

const wls = k => localStorage.getItem('whoop_'+k)||'';
const wsave = (k,v) => localStorage.setItem('whoop_'+k, v);
const wclear = (...keys) => keys.forEach(k=>localStorage.removeItem('whoop_'+k));

function isWhoopConnected(){ return !!wls('access_token'); }

let _whoopCache = null;
function getWhoopCache(){
  if(_whoopCache) return _whoopCache;
  try{ _whoopCache = JSON.parse(localStorage.getItem('whoop_cache')||'{}'); }catch(e){ _whoopCache={}; }
  return _whoopCache;
}
function saveWhoopCache(patch){
  _whoopCache = {...getWhoopCache(), ...patch, lastSync: Date.now()};
  try{ localStorage.setItem('whoop_cache', JSON.stringify(_whoopCache)); }catch(e){}
}

// ── PKCE helpers ────────────────────────────────────────────────
async function genPKCE(){
  const arr = new Uint8Array(32); crypto.getRandomValues(arr);
  const enc = v => btoa(String.fromCharCode(...v)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const verifier = enc(arr);
  if(crypto.subtle){
    const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
    return { verifier, challenge: enc(new Uint8Array(digest)) };
  }
  // Fallback: no PKCE challenge (still uses state for CSRF)
  return { verifier, challenge: null };
}

// ── OAuth flow ──────────────────────────────────────────────────
async function whoopConnect(){
  try{
    if(!wls('client_id')){ showToast('Introduce primero el Client ID'); return; }
    const {verifier,challenge} = await genPKCE();
    wsave('pkce', verifier);
    const params = {
      response_type:'code', client_id:wls('client_id'),
      redirect_uri: location.origin+location.pathname,
      scope: WHOOP_SCOPE, state:'whoop_oauth',
    };
    if(challenge){ params.code_challenge=challenge; params.code_challenge_method='S256'; }
    const url = WHOOP_AUTH+'?'+new URLSearchParams(params);
    console.log('[WHOOP] Redirecting to:', url);
    window.location.href = url;
  }catch(err){
    console.error('[WHOOP] Connect error:', err);
    showToast('⚠️ Error al conectar WHOOP: '+(err.message||err));
  }
}

async function handleWhoopCallback(){
  const p = new URLSearchParams(location.search);
  if(p.get('state') !== 'whoop_oauth') return false;
  window.history.replaceState({}, '', location.pathname);
  // WHOOP sends ?error=... when auth fails (e.g. user not a test user, bad redirect_uri)
  const whoopError = p.get('error');
  if(whoopError){
    const desc = decodeURIComponent(p.get('error_description')||whoopError);
    console.error('[WHOOP] Auth rejected:', whoopError, desc);
    alert('WHOOP rechazó la autorización:\n\n'+desc+'\n\nAsegúrate de que tu cuenta WHOOP está añadida como Test User en el Developer Portal.');
    return true;
  }
  const code = p.get('code');
  if(!code){ showToast('⚠️ WHOOP: autorización cancelada'); return true; }
  try{
    const body = new URLSearchParams({
      grant_type:'authorization_code', code,
      client_id: wls('client_id'), client_secret: wls('client_secret'),
      redirect_uri: location.origin+location.pathname,
      code_verifier: wls('pkce'),
    });
    wclear('pkce');
    if(!wls('worker_url')) throw new Error('Falta la URL del Worker — ver sección WHOOP en Datos');
    const r = await fetch(whoopTokenUrl(), {method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'}, body});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const t = await r.json();
    wsave('access_token', t.access_token);
    wsave('refresh_token', t.refresh_token||'');
    wsave('token_expiry', Date.now()+(t.expires_in||3600)*1000);
    showToast('✓ WHOOP conectado correctamente');
    await syncWhoopAll(true);
  }catch(e){
    showToast('⚠️ Error conectando WHOOP: '+(e.message||e));
    console.error('WHOOP token error:', e);
  }
  return true;
}

async function whoopRefresh(){
  const body = new URLSearchParams({
    grant_type:'refresh_token', refresh_token: wls('refresh_token'),
    client_id: wls('client_id'), client_secret: wls('client_secret'),
  });
  const r = await fetch(whoopTokenUrl(), {method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'}, body});
  if(!r.ok) throw new Error('Refresh failed '+r.status);
  const t = await r.json();
  wsave('access_token', t.access_token);
  wsave('refresh_token', t.refresh_token||wls('refresh_token'));
  wsave('token_expiry', Date.now()+(t.expires_in||3600)*1000);
  return t.access_token;
}

async function whoopFetch(endpoint){
  let token = wls('access_token');
  if(!token) throw new Error('No conectado');
  if(Date.now() > parseInt(wls('token_expiry'))-60000) token = await whoopRefresh();
  const base = whoopApiBase();
  const r = await fetch(base+endpoint, {headers:{Authorization:'Bearer '+token}});
  if(r.status===401){ token=await whoopRefresh();
    const r2=await fetch(base+endpoint,{headers:{Authorization:'Bearer '+token}});
    if(!r2.ok) throw new Error('API '+r2.status); return r2.json(); }
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}

// ── Data sync ───────────────────────────────────────────────────
async function syncWhoopRecovery(){
  // Use yesterday+today window — WHOOP processes data with ~24h delay
  const now=new Date();
  const s=new Date(now); s.setDate(s.getDate()-1); s.setHours(0,0,0,0);
  const e=new Date(now); e.setHours(23,59,59,999);
  const qs=`start=${s.toISOString()}&end=${e.toISOString()}&limit=2`;

  // /recovery needs read:recovery ✓  |  /sleep needs read:sleep ✓
  const [recData, sleepData] = await Promise.allSettled([
    whoopFetch(`/recovery?${qs}`),
    whoopFetch(`/sleep?${qs}`),
  ]);

  const rec  = (recData.status==='fulfilled'   ? recData.value.records?.[0]?.score   : null) || {};
  const sl   = (sleepData.status==='fulfilled' ? sleepData.value.records?.[0]?.score : null) || {};

  saveWhoopCache({
    recovery:{
      score: rec.recovery_score??null,
      hrv:   rec.hrv_rmssd_milli??null,
      rhr:   rec.resting_heart_rate??null,
      spo2:  rec.spo2_percentage??null,
    },
    sleep:{
      performance: sl.sleep_performance_percentage??null,
    },
  });
}

async function syncWhoopWorkout(date){
  const data=await whoopFetch(
    `/activity/workout?start=${date}T00:00:00.000Z&end=${date}T23:59:59.999Z`);
  if(!data.records?.length) return;
  const w=data.records.reduce((mx,r)=>(r.score?.strain??0)>(mx.score?.strain??0)?r:mx);
  const sc=w.score||{};
  const cache=getWhoopCache();
  const workouts=cache.workouts||{};
  workouts[date]={
    strain:   sc.strain??null,
    avgHr:    sc.average_heart_rate??null,
    maxHr:    sc.max_heart_rate??null,
    calories: sc.kilojoule ? Math.round(sc.kilojoule*0.239) : null,
    duration: w.start_time&&w.end_time ?
      Math.round((new Date(w.end_time)-new Date(w.start_time))/60000) : null,
  };
  saveWhoopCache({workouts});
}

async function syncWhoopBody(){
  try{
    const data=await whoopFetch('/body_measurement');
    saveWhoopCache({body:{
      weight_kilogram: data.weight_kilogram??null,
      height_meter:    data.height_meter??null,
      max_heart_rate:  data.max_heart_rate??null,
    }});
  }catch(e){ console.warn('WHOOP body sync skipped:', e.message); }
}

async function syncWhoopAll(quiet=false){
  if(!isWhoopConnected()) return;
  try{
    // All syncs in parallel where possible
    const yest=new Date(); yest.setDate(yest.getDate()-1);
    await Promise.all([
      syncWhoopRecovery(),
      syncWhoopBody(),
      syncWhoopWorkout(yest.toISOString().split('T')[0]),
      syncWhoopWorkout(today()),
    ]);
    if(!quiet) showToast('✓ WHOOP sincronizado');
    if(currentView==='home')   renderHome();
    if(currentView==='log')    renderLog();
    if(currentView==='data')   renderData();
    if(currentView==='history')renderHistory();
  }catch(e){
    console.error('WHOOP sync:', e);
    if(!quiet) showToast('⚠️ Error sincronizando WHOOP');
  }
}

async function saveWhoopCreds(){
  const cid=(document.getElementById('whoop-cid')?.value||'').trim();
  const cs =(document.getElementById('whoop-cs')?.value||'').trim();
  const wu =(document.getElementById('whoop-worker')?.value||'').trim();
  if(!cid){ showToast('Client ID requerido'); return; }
  if(!wu){ showToast('Worker URL requerida — despliega el Cloudflare Worker primero'); return; }
  wsave('client_id', cid); wsave('client_secret', cs); wsave('worker_url', wu);
  await whoopConnect();
}

function whoopDisconnect(){
  if(!confirm('¿Desconectar WHOOP? Se borran los tokens del dispositivo.')) return;
  wclear('access_token','refresh_token','token_expiry','cache','pkce');
  _whoopCache=null;
  showToast('WHOOP desconectado');
  render();
}

// ── UI helpers ──────────────────────────────────────────────────
function recoveryColor(s){
  if(s==null) return'var(--muted)';
  return s>=67?'#3CE0A0':s>=34?'#F5C842':'#E84040';
}
function fmtStrain(s){ return s!=null?s.toFixed(1):'—'; }

function renderWhoopRecoveryCard(){
  if(!isWhoopConnected()) return'';
  const c=getWhoopCache(), r=c.recovery||{}, sl=c.sleep||{};
  const lastSync=c.lastSync
    ? new Date(c.lastSync).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '';
  const hasData = r.score != null;
  return`<div class="whoop-card${hasData?' connected':''}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${hasData?12:0}px">
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px">⌚ WHOOP · Hoy</span>
      <button onclick="syncWhoopAll()" style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit">
        ⟳${lastSync?' '+lastSync:''}
      </button>
    </div>
    ${!hasData
      ? `<div style="font-size:12px;color:var(--muted)">Sin datos aún — toca ⟳ para sincronizar</div>`
      : `<div style="display:flex;gap:0;align-items:center">
          <div style="text-align:center;padding-right:14px;margin-right:14px;border-right:1px solid var(--line);flex-shrink:0">
            <div style="font-size:38px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;color:${recoveryColor(r.score)}">${Math.round(r.score)}</div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;color:${recoveryColor(r.score)}">Recovery</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;flex:1">
            ${[
              ['HRV', r.hrv!=null?Math.round(r.hrv)+'ms':'—'],
              ['RHR', r.rhr!=null?Math.round(r.rhr)+' bpm':'—'],
              ['Sueño',sl.performance!=null?Math.round(sl.performance)+'%':'—'],
              ['SpO₂', r.spo2!=null?Math.round(r.spo2)+'%':'—'],
            ].map(([l,v])=>`<div class="whoop-metric">
              <div class="whoop-metric-val">${v}</div>
              <div class="whoop-metric-lbl">${l}</div>
            </div>`).join('')}
          </div>
        </div>`
    }
  </div>`;
}

function renderWhoopStrainBadge(date){
  if(!isWhoopConnected()) return'';
  const w=(getWhoopCache().workouts||{})[date];
  if(!w||w.strain==null) return'';
  const parts=[`💥 ${fmtStrain(w.strain)}`];
  if(w.avgHr) parts.push(`~${Math.round(w.avgHr)}bpm`);
  if(w.duration) parts.push(`${w.duration}min`);
  return`<span class="whoop-strain-badge">${parts.join(' · ')}</span>`;
}

}
